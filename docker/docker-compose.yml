version: "3.8"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    secrets:
      - db_url
    depends_on:
      db:
        condition: service_healthy
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/db_root_password
      - MYSQL_DATABASE=simple_geo
      - MYSQL_USER=simplegeo
      - MYSQL_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_root_password
      - db_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  mysql_data:

secrets:
  db_url:
    external: true
  db_password:
    external: true
  db_root_password:
    external: true
